# argocd/applications/rag.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rag
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/evilsysadmin/platform-lab
    targetRevision: HEAD
    path: rag/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: rag
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
