apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: rag-gateway
  namespace: rag
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rag-api
  namespace: rag
spec:
  parentRefs:
    - name: rag-gateway
  hostnames:
    - rag.lab
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rag-api
          port: 8000
